<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Mali&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="password.css">
  <title>Password</title>

  <style>
    body {
      font-family: 'Mali', cursive;
      background: linear-gradient(135deg, #ffb6c1, #ffe4ec);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h2 {
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 1px 1px 3px #00000030;
    }

    .box {
      display: flex;
      gap: 10px;
    }

    .box input {
      width: 50px;
      height: 60px;
      font-size: 24px;
      text-align: center;
      border-radius: 10px;
      border: none;
      outline: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff2e55;
    }
  </style>
</head>

<body>

  <h2>💖กรุณาระบุรหัสผ่าน💖</h2>
  <p>คำใบ้ : วันที่/เดือน ที่คบกัน</p>

<div class="box">
  <input type="tel" inputmode="numeric" autocomplete="off" maxlength="1" id="n1">
  <input type="tel" inputmode="numeric" autocomplete="off" maxlength="1" id="n2">
  <input type="tel" inputmode="numeric" autocomplete="off" maxlength="1" id="n3">
  <input type="tel" inputmode="numeric" autocomplete="off" maxlength="1" id="n4">
</div>

  <button id="unlockBtn" onclick="checkPass()">ปลดล็อก</button>

  <script>
const inputs = document.querySelectorAll(".box input");

inputs.forEach((input, index) => {

  // พิมพ์แล้วไปช่องถัดไป
  input.addEventListener("input", () => {
    if (input.value && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
  });

  // กด Backspace แล้วย้อนกลับ
input.addEventListener("keydown", (e) => {
  if (e.key === "Backspace" && input.value === "" && index > 0) {
    inputs[index - 1].value = "";
    inputs[index - 1].focus();
  }
});

});
    function checkPass() {
      const code =
        document.getElementById("n1").value +
        document.getElementById("n2").value +
        document.getElementById("n3").value +
        document.getElementById("n4").value;

      if (code === "1234") {
        alert("ปลดล็อกสำเร็จ 💖");
        window.location.href = "menu.html";
      } else {
        alert("เธอจำไม่ได้อ่อออ 😢");
      }
    }
  </script>

            <span>♥</span><span>♥</span><span>♥</span><span>♥</span>
            
        </div>

    </div>
</body>
</html>
