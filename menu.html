<!DOCTYPE html>
<html lang="th">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <title>Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Mali&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="menu.css">

  <style>
    body{
      font-family: 'Mali', cursive;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #ffd1dc, #ffeef3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1{
      margin-bottom: 20px;
      color: #444;
    }

  .menu{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;

  width: 95vw;
  max-width: 650px;
}

    .card{
  width: 100%;
  aspect-ratio: 1/1;

  background: #ff5c8a;
  border-radius: 18px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;

  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

    .card:hover{
      transform: scale(1.05);
    }

.icon-img{
  width: 55px;
  height: 55px;
  object-fit: contain;

  margin-bottom: 10px;

  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  padding: 8px;

  display: block;

  animation: float 2s ease-in-out infinite;
}
    
  </style>
</head>

<body>

<h1>💖 เลือกเมนู 💖</h1>

<div class="menu">

  <div class="card" onclick="location.href='flower.html'">
    <img src="gift.png" class="icon-img">
    <div>ของขวัญสำหรับคนเก่ง</div>
  </div>

  <div class="card" onclick="location.href='memory.html'">
    <img src="camera.png" class="icon-img">
    <div>ภาพความทรงจำ</div>
  </div>

  <div class="card" onclick="location.href='letter.html'">
    <img src="jm.png" class="icon-img">
    <div>ถึงเธอ</div>
  </div>

  <div class="card" onclick="location.href='reason.html'">
    <img src="cherry.png" class="icon-img">
    <div>เหตุผลที่รักเธอ</div>
  </div>

</div>

</body>
</html>
