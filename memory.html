<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ภาพความทรงจำ</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Mali',cursive;
    background:linear-gradient(
        135deg,
        #ffd6e7,
        #fff5f8,
        #e9fbff
    );
    min-height:100vh;
    overflow-x:hidden;
}

h1{
    text-align:center;
    margin:40px 0;
    color:#ff6b9c;
    font-size:2.3rem;
}

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    background:white;
    width:45px;
    height:45px;
    border-radius:50%;
    text-decoration:none;
    color:#ff6b9c;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.timeline{
    width:90%;
    max-width:800px;
    margin:auto;
}

.memory{
    background:white;
    padding:15px;
    border-radius:20px;
    margin-bottom:40px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);

    opacity:0;
    transform:translateY(50px);

    animation:show 1s forwards;
}

.memory:nth-child(1){animation-delay:.5s;}
.memory:nth-child(2){animation-delay:1.5s;}
.memory:nth-child(3){animation-delay:2.5s;}
.memory:nth-child(4){animation-delay:3.5s;}

.memory img{
    width:100%;
    border-radius:15px;
}

.caption{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:18px;
}

@keyframes show{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:fixed;
    color:#ff8ab0;
    animation:float 6s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

.end-message{
    text-align:center;
    font-size:24px;
    color:#ff6b9c;
    margin:60px 0;
    font-weight:bold;
}

</style>
</head>

<body>

<a href="menu.html" class="back-btn">←</a>

<h1>📷 ภาพความทรงจำ</h1>

<div class="timeline">

<div class="memory">
<img src="img1.png">
<div class="caption">
💕 วันแรกที่ได้คุยกัน
</div>
</div>

<div class="memory">
<img src="img2.png">
<div class="caption">
🍜 วันที่ไปกินของอร่อยด้วยกัน
</div>
</div>

<div class="memory">
<img src="img3.png">
<div class="caption">
😊 วันที่เธอทำให้เรายิ้มได้
</div>
</div>

<div class="memory">
<img src="img4.png">
<div class="caption">
❤️ และนี่คือความทรงจำที่เราชอบที่สุด
</div>
</div>

<div class="end-message">
ขอบคุณที่เข้ามาเป็นความทรงจำดี ๆ ของเรานะ 🌷💖
<p>---ลินิน---</p>
</div>

</div>

<script>

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";
heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
